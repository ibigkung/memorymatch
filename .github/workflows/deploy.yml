# ============================================================
# GitHub Actions Workflow: Build & Deploy to GitHub Pages
# Project: ibigkung/memorymatch
# Fixed: Upgraded Actions to Node.js 24 compatible versions
#
# การเปลี่ยนแปลงหลัก (Changes):
#   - actions/checkout@v4  → actions/checkout@v6   (Node 24)
#   - actions/upload-artifact@v4 → actions/upload-artifact@v6 (Node 24)
#   - เพิ่ม Dependabot config แนะนำแยกต่างหาก
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # แก้เป็น branch หลักของคุณ (main หรือ master)
  workflow_dispatch:  # อนุญาตให้ run manual ได้

# กำหนด permission ขั้นต่ำที่จำเป็น (Security Best Practice)
permissions:
  contents: read
  pages: write
  id-token: write

# ป้องกัน deploy ซ้อนกัน
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # ✅ FIXED: v4 → v6 (รองรับ Node.js 24)
      - name: Checkout repository
        uses: actions/checkout@v6

      # (ถ้าโปรเจกต์ใช้ Node.js ในการ build — เช่น React/Vue/Vite)
      # ปลด comment ด้านล่างนี้หากต้องการ:
      # - name: Setup Node.js
      #   uses: actions/setup-node@v6
      #   with:
      #     node-version: '24'
      #     cache: 'npm'
      #
      # - name: Install dependencies
      #   run: npm ci
      #
      # - name: Build project
      #   run: npm run build

      # Setup GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # ✅ FIXED: v4 → v6 (รองรับ Node.js 24)
      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # เปลี่ยน path ให้ตรงกับ output directory ของโปรเจกต์คุณ
          # ตัวอย่าง: './dist' สำหรับ Vite/React, './build' สำหรับ CRA
          path: '.'   # ← แก้ตรงนี้ให้ตรงกับ project ของคุณ

  # ─────────────────────────────────────────────
  # JOB 2: Report Build Status (ถ้ามีใน workflow เดิม)
  # ─────────────────────────────────────────────
  report-build-status:
    name: Report Build Status
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Report status
        run: |
          echo "Build status: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 3: Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
